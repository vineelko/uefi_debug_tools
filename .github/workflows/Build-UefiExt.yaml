name: "Build UEFI Debug Extension"

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

env:
  PATINA_OUTPUT_DIR: patina-ext\dist\PatinaExt.js

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64, arm64]
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup MsBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Build DLL
        run: msbuild UefiDbgExt\uefiext.vcxproj -property:Configuration=${{ matrix.configuration }} -property:Platform=${{ matrix.platform }}

      - name: Build Javascript Extension
        run: npm install && npm run build
        working-directory: patina-ext

      - name: Publish Binary
        if: ${{ matrix.configuration == 'Release' && github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: UefiDbgExt-${{ matrix.platform }}-${{ matrix.configuration }}
          path: |
            UefiDbgExt\${{ matrix.platform }}\${{ matrix.configuration }}\uefiext.dll
            ${{ env.PATINA_OUTPUT_DIR }}

      - name: Publish Release Asset
        if: ${{ matrix.configuration == 'Release' && github.event_name == 'release' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Compress-Archive -Path UefiDbgExt\${{ matrix.platform }}\${{ matrix.configuration }}\uefiext.dll, ${{ env.PATINA_OUTPUT_DIR }} -DestinationPath UefiExt_${{ matrix.platform }}.zip
          gh release upload ${{ github.event.release.tag_name }} UefiExt_${{ matrix.platform }}.zip
